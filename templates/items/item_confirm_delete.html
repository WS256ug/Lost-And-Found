{% extends "base.html" %}
{% block title %}Delete {{ item.title }} | Digital Lost and Found{% endblock %}

{% block content %}
<section class="panel narrow">
    <h1>Delete Item</h1>
    <p>Are you sure you want to delete "{{ item.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Delete</button>
        <a href="{% url 'item_detail' item.pk %}" class="btn-secondary">Cancel</a>
    </form>
</section>
{% endblock %}
